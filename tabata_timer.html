<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#14171A">
<meta name="description" content="A configurable Tabata / HIIT interval timer with sound cues, round tracking, and a screen wake lock — runs entirely in the browser.">
<title>Tabata Timer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='55' r='36' fill='none' stroke='%23FF4429' stroke-width='9'/%3E%3Cline x1='50' y1='55' x2='50' y2='30' stroke='%23FF4429' stroke-width='9' stroke-linecap='round'/%3E%3Cline x1='50' y1='55' x2='67' y2='62' stroke='%23FF4429' stroke-width='9' stroke-linecap='round'/%3E%3Cline x1='36' y1='11' x2='64' y2='11' stroke='%23FF4429' stroke-width='9' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14171A; --panel:#1D2126; --panel-2:#262B31; --line:#2B3036;
    --text:#F2EFE6; --muted:#84898F;
    --go:#FF4429; --recover:#2AD1C4; --ready:#FFC23C; --clear:#6FD17A;
    --phase: var(--ready);
    --ff-display:'Big Shoulders','Arial Narrow',sans-serif;
    --ff-mono:'Space Mono','SFMono-Regular',Consolas,monospace;
  }
  [data-phase="idle"]{ --phase: var(--ready); }
  [data-phase="prepare"]{ --phase: var(--ready); }
  [data-phase="work"]{ --phase: var(--go); }
  [data-phase="rest"]{ --phase: var(--recover); }
  [data-phase="restset"]{ --phase: var(--recover); }
  [data-phase="done"]{ --phase: var(--clear); }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--bg); color:var(--text);
    font-family:var(--ff-mono);
    min-height:100vh; min-height:100dvh;
    -webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
  }
  button{ font-family:inherit; }
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible{
    outline:2px solid var(--phase); outline-offset:2px;
  }

  .stage{
    position:relative; isolation:isolate;
    display:flex; flex-direction:column;
    min-height:100vh; min-height:100dvh;
    padding: clamp(1rem,4vw,2rem);
    padding-top: max(env(safe-area-inset-top), 1rem);
    padding-bottom: max(env(safe-area-inset-bottom), 1rem);
  }
  .stage::before{
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background: radial-gradient(circle at 50% 32%, var(--phase) 0%, transparent 60%);
    opacity:.10; transition: background .6s ease, opacity .6s ease;
  }
  [data-phase="idle"].stage::before{ opacity:.05; }

  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:.75rem; }
  .set-badge{
    font-size:.7rem; letter-spacing:.08em; color:var(--muted);
    border:1px solid var(--line); padding:.4rem .75rem; border-radius:999px;
  }
  .icon-btn{
    width:40px; height:40px; border-radius:50%;
    background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    font-size:1.05rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition: opacity .2s ease;
  }
  .icon-btn:disabled{ opacity:.3; cursor:not-allowed; }

  .progress-rail{
    height:4px; border-radius:999px; background:var(--line);
    margin-top:.9rem; overflow:hidden;
  }
  .progress-fill{
    height:100%; width:0%; background:var(--phase);
    transition: width .25s linear, background-color .6s ease;
  }

  .dial{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:.4rem; padding: 1.5rem 0;
  }
  .phase-word{
    font-family:var(--ff-display); font-weight:700; text-transform:uppercase;
    letter-spacing:.28em; font-size:clamp(1rem,4vw,1.5rem); color:var(--phase);
    margin:0; transition:color .6s ease;
  }
  .timer-number{
    font-family:var(--ff-display); font-weight:800; line-height:.88;
    font-size:clamp(5.5rem,33vw,12rem); margin:0; color:var(--text);
    font-variant-numeric:tabular-nums; letter-spacing:-.02em;
  }
  .timer-number.tick{ animation:number-tick .35s ease-out; }
  @keyframes number-tick{ 0%{transform:scale(1);} 35%{transform:scale(1.08);} 100%{transform:scale(1);} }

  .sub-label{
    margin:.2rem 0 .6rem; color:var(--muted); font-size:.78rem;
    letter-spacing:.02em; min-height:2.2em; max-width:30ch;
  }

  .pips{ display:flex; flex-wrap:wrap; justify-content:center; gap:.5rem; max-width:90vw; }
  .pip{
    width:13px; height:13px; border-radius:50%;
    border:2px solid var(--line); display:inline-block;
    transition: background-color .3s ease, border-color .3s ease;
  }
  .pip-done{ background:var(--muted); border-color:var(--muted); }
  .pip-active{
    background:var(--phase); border-color:var(--phase);
    animation: pip-pulse 1.15s ease-in-out infinite;
  }
  @keyframes pip-pulse{
    0%,100%{ transform:scale(1); box-shadow:0 0 0 0 transparent; }
    50%{ transform:scale(1.2); box-shadow:0 0 0 5px var(--phase); }
  }

  .controls{
    display:grid; grid-template-columns:1fr 1.6fr 1fr; gap:.7rem;
    max-width:460px; width:100%; margin:0 auto;
  }
  .btn{
    min-height:50px; border-radius:14px; cursor:pointer;
    font-weight:700; letter-spacing:.06em; font-size:clamp(.78rem,2.4vw,.95rem);
    text-transform:uppercase; transition: opacity .2s ease, transform .1s ease, background-color .5s ease;
  }
  .btn:active{ transform:scale(.97); }
  .btn:disabled{ opacity:.32; cursor:not-allowed; transform:none; }
  .btn-primary{ border:none; background:var(--phase); color:var(--bg); }
  .btn-ghost{ border:1px solid var(--line); background:transparent; color:var(--text); }

  .hint{
    text-align:center; color:var(--muted); font-size:.68rem; letter-spacing:.04em;
    margin-top:.9rem;
  }

  .sr-only{
    position:absolute; width:1px; height:1px; overflow:hidden;
    clip:rect(0 0 0 0); white-space:nowrap;
  }

  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:40;
    opacity:0; pointer-events:none; transition:opacity .3s ease;
  }
  .overlay.open{ opacity:1; pointer-events:auto; }

  .settings-panel{
    position:fixed; top:0; right:0; height:100vh; height:100dvh; width:min(360px,100vw);
    background:var(--panel); border-left:1px solid var(--line); z-index:50;
    padding:1.3rem; display:flex; flex-direction:column; gap:1.1rem;
    transform:translateX(100%); transition:transform .32s ease; overflow-y:auto;
  }
  .settings-panel.open{ transform:translateX(0); }
  .settings-head{ display:flex; align-items:center; justify-content:space-between; }
  .settings-title{
    font-family:var(--ff-display); text-transform:uppercase; letter-spacing:.16em;
    font-size:1rem; margin:0; color:var(--text);
  }
  .stepper{
    display:flex; align-items:center; justify-content:space-between;
    padding:.65rem 0; border-bottom:1px solid var(--line);
  }
  .stepper-label{ font-size:.72rem; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
  .stepper-controls{ display:flex; align-items:center; gap:.6rem; }
  .stepper-btn{
    width:30px; height:30px; border-radius:50%; border:1px solid var(--line);
    background:var(--panel-2); color:var(--text); font-size:1rem; line-height:1; cursor:pointer;
  }
  .stepper-value{ min-width:3.4rem; text-align:center; font-variant-numeric:tabular-nums; }
  .stepper-value small{ color:var(--muted); margin-left:2px; }
  .sound-row{ display:flex; align-items:center; justify-content:space-between; padding-top:.3rem; }
  .sound-row input{ width:18px; height:18px; accent-color:var(--go); }
  .panel-footer{ margin-top:auto; font-size:.68rem; color:var(--muted); text-align:center; }

  @media (max-width:600px){
    .settings-panel{
      left:0; right:0; top:auto; bottom:0; width:100%;
      height:auto; max-height:88dvh; border-left:none; border-top:1px solid var(--line);
      border-radius:20px 20px 0 0; transform:translateY(100%);
      padding-bottom: max(env(safe-area-inset-bottom), 1.3rem);
    }
    .settings-panel.open{ transform:translateY(0); }
    .hint{ display:none; }
  }

  @media (prefers-reduced-motion: reduce){
    .pip-active{ animation:none; }
    .timer-number.tick{ animation:none; }
    .progress-fill, .stage::before, .phase-word, .pip, .icon-btn, .btn, .settings-panel, .overlay{
      transition-duration:.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="stage" id="stage" data-phase="idle">
  <div class="progress-rail"><div class="progress-fill" id="sessionFill"></div></div>

  <div class="topbar">
    <span class="set-badge" id="setBadge">SET 1 / 1</span>
    <button class="icon-btn" id="settingsBtn" aria-label="Open timer settings" aria-haspopup="dialog">⚙</button>
  </div>

  <main class="dial">
    <p class="phase-word" id="phaseWord">READY</p>
    <p class="timer-number" id="timerNumber">20</p>
    <p class="sub-label" id="subLabel">8 rounds · 20s work / 10s rest</p>
    <div class="pips" id="pips" role="img" aria-label="Round progress for the current set"></div>
  </main>

  <div class="controls">
    <button class="btn btn-ghost" id="skipBtn" disabled>Skip</button>
    <button class="btn btn-primary" id="startBtn">Start</button>
    <button class="btn btn-ghost" id="resetBtn">Reset</button>
  </div>
  <p class="hint">Space — start / pause &nbsp;·&nbsp; R — reset</p>

  <p class="sr-only" id="announcer" aria-live="polite"></p>
</div>

<div class="overlay" id="overlay" hidden></div>
<aside class="settings-panel" id="settingsPanel" role="dialog" aria-modal="true" aria-label="Timer settings" hidden>
  <div class="settings-head">
    <h2 class="settings-title">Settings</h2>
    <button class="icon-btn" id="closeSettingsBtn" aria-label="Close settings">✕</button>
  </div>

  <div class="stepper" data-key="prepare" data-min="0" data-max="60" data-step="5">
    <span class="stepper-label">Prepare</span>
    <div class="stepper-controls">
      <button class="stepper-btn" data-dir="-1" aria-label="Decrease prepare time">–</button>
      <span class="stepper-value" data-value></span>
      <button class="stepper-btn" data-dir="1" aria-label="Increase prepare time">+</button>
    </div>
  </div>

  <div class="stepper" data-key="work" data-min="5" data-max="300" data-step="5">
    <span class="stepper-label">Work</span>
    <div class="stepper-controls">
      <button class="stepper-btn" data-dir="-1" aria-label="Decrease work time">–</button>
      <span class="stepper-value" data-value></span>
      <button class="stepper-btn" data-dir="1" aria-label="Increase work time">+</button>
    </div>
  </div>

  <div class="stepper" data-key="rest" data-min="0" data-max="300" data-step="5">
    <span class="stepper-label">Rest</span>
    <div class="stepper-controls">
      <button class="stepper-btn" data-dir="-1" aria-label="Decrease rest time">–</button>
      <span class="stepper-value" data-value></span>
      <button class="stepper-btn" data-dir="1" aria-label="Increase rest time">+</button>
    </div>
  </div>

  <div class="stepper" data-key="rounds" data-min="1" data-max="50" data-step="1">
    <span class="stepper-label">Rounds</span>
    <div class="stepper-controls">
      <button class="stepper-btn" data-dir="-1" aria-label="Decrease rounds">–</button>
      <span class="stepper-value" data-value></span>
      <button class="stepper-btn" data-dir="1" aria-label="Increase rounds">+</button>
    </div>
  </div>

  <div class="stepper" data-key="sets" data-min="1" data-max="20" data-step="1">
    <span class="stepper-label">Sets</span>
    <div class="stepper-controls">
      <button class="stepper-btn" data-dir="-1" aria-label="Decrease sets">–</button>
      <span class="stepper-value" data-value></span>
      <button class="stepper-btn" data-dir="1" aria-label="Increase sets">+</button>
    </div>
  </div>

  <div class="stepper" data-key="restBetweenSets" data-min="0" data-max="600" data-step="5">
    <span class="stepper-label">Rest between sets</span>
    <div class="stepper-controls">
      <button class="stepper-btn" data-dir="-1" aria-label="Decrease rest between sets">–</button>
      <span class="stepper-value" data-value></span>
      <button class="stepper-btn" data-dir="1" aria-label="Increase rest between sets">+</button>
    </div>
  </div>

  <label class="sound-row">
    <span class="stepper-label">Sound</span>
    <input type="checkbox" id="soundToggle">
  </label>

  <p class="panel-footer">Settings are saved on this device.<br>Open is locked while the timer is running — reset first to edit.</p>
</aside>

<script>
(function(){
  "use strict";

  function durationFor(phase, cfg){
    switch(phase){
      case 'prepare': return cfg.prepare;
      case 'work': return cfg.work;
      case 'rest': return cfg.rest;
      case 'restset': return cfg.restBetweenSets;
      default: return 0;
    }
  }
  function startState(cfg){
    return cfg.prepare > 0 ? { phase:'prepare', round:1, set:1 } : { phase:'work', round:1, set:1 };
  }
  function nextState(s, cfg){
    const { phase, round, set } = s;
    if(phase === 'prepare'){ return { phase:'work', round:1, set:1 }; }
    if(phase === 'work'){
      const lastRoundOfSet = round >= cfg.rounds;
      if(!lastRoundOfSet){
        return cfg.rest > 0 ? { phase:'rest', round, set } : { phase:'work', round:round+1, set };
      }
      const lastSet = set >= cfg.sets;
      if(lastSet) return { phase:'done', round, set };
      return cfg.restBetweenSets > 0 ? { phase:'restset', round, set } : { phase:'work', round:1, set:set+1 };
    }
    if(phase === 'rest'){ return { phase:'work', round:round+1, set }; }
    if(phase === 'restset'){ return { phase:'work', round:1, set:set+1 }; }
    return s;
  }
  function buildTimeline(cfg){
    let s = startState(cfg);
    const tl = [];
    let guard = 0;
    while(s.phase !== 'done' && guard < 5000){
      tl.push(Object.assign({}, s, { duration: durationFor(s.phase, cfg) }));
      s = nextState(s, cfg);
      guard++;
    }
    return tl;
  }

  const DEFAULTS = { prepare:10, work:20, rest:10, rounds:8, sets:1, restBetweenSets:60, sound:true };
  const STORAGE_KEY = 'tabata-settings-v1';

  function clamp(v,min,max){ return Math.min(max, Math.max(min, v)); }

  function loadConfig(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return Object.assign({}, DEFAULTS);
      const parsed = JSON.parse(raw);
      return Object.assign({}, DEFAULTS, parsed);
    }catch(e){ return Object.assign({}, DEFAULTS); }
  }
  function saveConfig(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); }catch(e){}
  }

  let config = loadConfig();

  const stage = document.getElementById('stage');
  const sessionFill = document.getElementById('sessionFill');
  const setBadge = document.getElementById('setBadge');
  const settingsBtn = document.getElementById('settingsBtn');
  const phaseWord = document.getElementById('phaseWord');
  const timerNumber = document.getElementById('timerNumber');
  const subLabel = document.getElementById('subLabel');
  const pipsEl = document.getElementById('pips');
  const skipBtn = document.getElementById('skipBtn');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const announcer = document.getElementById('announcer');
  const overlay = document.getElementById('overlay');
  const settingsPanel = document.getElementById('settingsPanel');
  const closeSettingsBtn = document.getElementById('closeSettingsBtn');
  const soundToggle = document.getElementById('soundToggle');

  const LABELS = { prepare:'Get ready', work:'Work', rest:'Rest', restset:'Rest', done:'Complete' };

  let timeline = null, tIndex = -1;
  let state = { phase:'idle', round:1, set:1 };
  let remainingMs = 0, phaseEndTime = 0, isRunning = false, lastTickSecond = null;
  let audioCtx = null, wakeLock = null;

  function ensureAudio(){
    if(!config.sound) return;
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      else if(audioCtx.state === 'suspended') audioCtx.resume();
    }catch(e){}
  }
  function beep(freq, durMs, delaySec, type, vol){
    if(!config.sound || !audioCtx) return;
    try{
      const t0 = audioCtx.currentTime + (delaySec || 0);
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, t0);
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(vol || 0.25, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + (durMs || 150) / 1000);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t0);
      osc.stop(t0 + (durMs || 150) / 1000 + 0.03);
    }catch(e){}
  }
  function playPhaseSound(phase){
    if(!config.sound) return;
    ensureAudio();
    if(!audioCtx) return;
    switch(phase){
      case 'work':    beep(660,120,0,'sine',0.28); beep(990,170,0.12,'sine',0.28); break;
      case 'rest':    beep(740,150,0,'sine',0.24); beep(440,200,0.13,'sine',0.24); break;
      case 'restset': beep(740,150,0,'sine',0.24); beep(440,200,0.13,'sine',0.24); break;
      case 'prepare': beep(520,150,0,'sine',0.24); break;
      case 'done':    beep(660,110,0,'sine',0.3); beep(880,110,0.12,'sine',0.3); beep(1180,260,0.24,'sine',0.32); break;
    }
  }
  function tickBeep(){ beep(880,90,0,'square',0.18); }

  function requestWakeLock(){
    if('wakeLock' in navigator){
      navigator.wakeLock.request('screen').then(function(lock){ wakeLock = lock; }).catch(function(){});
    }
  }
  function clearWakeLock(){
    if(wakeLock){ wakeLock.release().catch(function(){}); wakeLock = null; }
  }
  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState === 'visible' && isRunning && !wakeLock) requestWakeLock();
  });

  function announce(msg){ announcer.textContent = msg; }

  function formatClock(totalSec){
    const m = Math.floor(totalSec/60), s = totalSec % 60;
    return m + ':' + String(s).padStart(2,'0');
  }

  function renderPips(completed, total, activeIdx){
    pipsEl.innerHTML = '';
    const frag = document.createDocumentFragment();
    for(let i=1; i<=total; i++){
      const dot = document.createElement('span');
      dot.className = 'pip';
      if(i <= completed) dot.classList.add('pip-done');
      else if(i === activeIdx) dot.classList.add('pip-active');
      frag.appendChild(dot);
    }
    pipsEl.appendChild(frag);
  }

  function renderIdle(){
    stage.dataset.phase = 'idle';
    phaseWord.textContent = 'Ready'.toUpperCase();
    timerNumber.textContent = config.prepare > 0 ? config.prepare : config.work;
    const tl = buildTimeline(config);
    const totalSec = tl.reduce(function(a,b){ return a+b.duration; }, 0);
    let summary = config.rounds + ' round' + (config.rounds>1 ? 's':'') + ' · ' + config.work + 's work';
    summary += config.rest > 0 ? ' / ' + config.rest + 's rest' : ' / no rest';
    if(config.sets > 1) summary += ' · ' + config.sets + ' sets';
    summary += ' · ~' + formatClock(totalSec) + ' total';
    subLabel.textContent = summary;
    renderPips(0, config.rounds, null);
    setBadge.textContent = 'SET 1 / ' + config.sets;
    sessionFill.style.width = '0%';
    startBtn.textContent = 'Start';
    skipBtn.disabled = true;
    settingsBtn.disabled = false;
  }

  function nextLabel(){
    if(!timeline) return '';
    const peek = (tIndex+1 < timeline.length) ? timeline[tIndex+1] : { phase:'done', set: state.set };
    if(peek.phase === 'done') return 'Final stretch — finish strong';
    if(peek.phase === 'rest') return 'Then: rest';
    if(peek.phase === 'restset') return 'Then: rest before set ' + (state.set+1);
    if(peek.phase === 'work'){
      return peek.set !== state.set ? 'Then: set ' + peek.set : 'Then: round ' + peek.round;
    }
    return '';
  }

  function renderActive(){
    stage.dataset.phase = state.phase;
    setBadge.textContent = 'SET ' + state.set + ' / ' + config.sets;

    if(state.phase === 'done'){
      phaseWord.textContent = 'Complete'.toUpperCase();
      timerNumber.textContent = '✓';
      subLabel.textContent = 'Workout complete — nice work.';
      renderPips(config.rounds, config.rounds, null);
      sessionFill.style.width = '100%';
      startBtn.textContent = 'Start';
      skipBtn.disabled = true;
      settingsBtn.disabled = false;
      return;
    }

    const secs = Math.max(0, Math.ceil(remainingMs/1000));
    phaseWord.textContent = (LABELS[state.phase] || '').toUpperCase();
    timerNumber.textContent = secs;
    subLabel.textContent = nextLabel();

    let completed, activeIdx;
    if(state.phase === 'restset'){ completed = config.rounds; activeIdx = null; }
    else if(state.phase === 'prepare'){ completed = 0; activeIdx = 1; }
    else { completed = state.round - 1; activeIdx = state.round; }
    renderPips(completed, config.rounds, activeIdx);

    const doneSoFar = timeline.slice(0, tIndex).reduce(function(a,b){ return a+b.duration; }, 0);
    const elapsedInPhase = timeline[tIndex].duration - secs;
    const totalSec = timeline.reduce(function(a,b){ return a+b.duration; }, 0);
    const pct = totalSec > 0 ? clamp(((doneSoFar+elapsedInPhase)/totalSec)*100, 0, 100) : 0;
    sessionFill.style.width = pct + '%';

    startBtn.textContent = isRunning ? 'Pause' : 'Resume';
    skipBtn.disabled = false;
    settingsBtn.disabled = true;
  }

  function goToIndex(idx){
    tIndex = idx;
    const entry = timeline[idx];
    state = { phase: entry.phase, round: entry.round, set: entry.set };
    remainingMs = entry.duration * 1000;
    lastTickSecond = null;
    playPhaseSound(state.phase);
    announce((LABELS[state.phase]||state.phase) + ((state.phase==='work'||state.phase==='rest') ? (', round ' + state.round) : ''));
    if(isRunning) phaseEndTime = Date.now() + remainingMs;
    renderActive();
  }

  function finishSession(){
    isRunning = false;
    state = { phase:'done', round: config.rounds, set: config.sets };
    playPhaseSound('done');
    announce('Workout complete');
    renderActive();
    clearWakeLock();
  }

  function advance(){
    if(tIndex+1 >= timeline.length){ finishSession(); return; }
    goToIndex(tIndex+1);
  }

  function startSession(){
    ensureAudio();
    timeline = buildTimeline(config);
    if(timeline.length === 0) return;
    isRunning = true;
    goToIndex(0);
    phaseEndTime = Date.now() + remainingMs;
    requestWakeLock();
  }

  function togglePause(){
    if(state.phase === 'idle' || state.phase === 'done' || !timeline){ startSession(); return; }
    if(isRunning){
      isRunning = false;
      remainingMs = Math.max(0, phaseEndTime - Date.now());
      renderActive();
    }else{
      isRunning = true;
      phaseEndTime = Date.now() + remainingMs;
      ensureAudio();
      renderActive();
      requestWakeLock();
    }
  }

  function resetSession(){
    isRunning = false;
    timeline = null; tIndex = -1;
    state = { phase:'idle', round:1, set:1 };
    remainingMs = 0;
    renderIdle();
    clearWakeLock();
  }

  function skipPhase(){
    if(!timeline || state.phase === 'idle' || state.phase === 'done') return;
    advance();
  }

  function maybeCountdownBeep(){
    if(state.phase === 'done') return;
    const secsLeft = Math.ceil(remainingMs/1000);
    if(secsLeft <= 3 && secsLeft >= 1 && secsLeft !== lastTickSecond){
      lastTickSecond = secsLeft;
      tickBeep();
      timerNumber.classList.remove('tick');
      void timerNumber.offsetWidth;
      timerNumber.classList.add('tick');
    }
  }

  function tick(){
    if(!isRunning) return;
    let guard = 0;
    while(true){
      const now = Date.now();
      remainingMs = phaseEndTime - now;
      if(remainingMs > 0 || !isRunning) break;
      advance();
      guard++;
      if(!isRunning || guard > 50) break;
    }
    if(!isRunning) return;
    maybeCountdownBeep();
    renderActive();
  }
  setInterval(tick, 100);

  function openSettings(){
    if(settingsBtn.disabled) return;
    overlay.hidden = false;
    settingsPanel.hidden = false;
    requestAnimationFrame(function(){
      overlay.classList.add('open');
      settingsPanel.classList.add('open');
    });
    closeSettingsBtn.focus();
  }
  function closeSettings(){
    overlay.classList.remove('open');
    settingsPanel.classList.remove('open');
    setTimeout(function(){ overlay.hidden = true; settingsPanel.hidden = true; }, 260);
    renderIdle();
    settingsBtn.focus();
  }
  settingsBtn.addEventListener('click', openSettings);
  closeSettingsBtn.addEventListener('click', closeSettings);
  overlay.addEventListener('click', closeSettings);

  document.querySelectorAll('.stepper').forEach(function(el){
    const key = el.dataset.key;
    const min = +el.dataset.min, max = +el.dataset.max, step = +el.dataset.step;
    const valueEl = el.querySelector('[data-value]');
    function refresh(){
      const unit = (key === 'rounds' || key === 'sets') ? '' : 's';
      valueEl.innerHTML = config[key] + (unit ? '<small>' + unit + '</small>' : '');
    }
    el.querySelectorAll('.stepper-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        const dir = +btn.dataset.dir;
        config[key] = clamp(config[key] + dir*step, min, max);
        refresh();
        saveConfig();
        if(state.phase === 'idle') renderIdle();
      });
    });
    refresh();
  });

  soundToggle.checked = config.sound;
  soundToggle.addEventListener('change', function(){
    config.sound = soundToggle.checked;
    saveConfig();
  });

  startBtn.addEventListener('click', togglePause);
  resetBtn.addEventListener('click', resetSession);
  skipBtn.addEventListener('click', skipPhase);

  document.addEventListener('keydown', function(e){
    if(!settingsPanel.hidden){
      if(e.key === 'Escape') closeSettings();
      return;
    }
    const tag = (e.target.tagName || '').toLowerCase();
    if(tag === 'button' || tag === 'input') return;
    if(e.code === 'Space'){ e.preventDefault(); togglePause(); }
    else if(e.key === 'r' || e.key === 'R'){ resetSession(); }
  });

  renderIdle();
})();
</script>
</body>
</html>
